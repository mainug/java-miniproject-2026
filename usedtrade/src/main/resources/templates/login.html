<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | 중고마켓</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <a href="/" style="text-decoration: none; color: inherit">
          <h1>중고마켓</h1>
        </a>
        <p class="auth-subtitle">
          로그인 후 중고거래 게시판을 사용할 수 있습니다.
        </p>

        <form
          id="authForm"
          action="/users/login"
          method="POST"
          class="auth-form"
        >
          <label class="row">
            <span>아이디</span>
            <input
              type="text"
              id="memberId"
              name="loginId"
              placeholder="아이디 입력"
              autocomplete="username"
            />
          </label>

          <label class="row">
            <span>비밀번호</span>
            <input
              type="password"
              id="memberPassword"
              name="password"
              placeholder="비밀번호 입력"
              autocomplete="current-password"
            />
          </label>

          <button type="submit" id="submitButton">로그인</button>
        </form>

        <p
          style="
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
          "
        >
          아직 계정이 없으신가요?
          <a
            href="/join"
            style="color: #2563eb; font-weight: bold; text-decoration: none"
            >회원가입 하기</a
          >
        </p>

        <div style="text-align: center; margin-top: 15px">
          <a
            href="/"
            style="
              display: inline-block;
              padding: 8px 16px;
              border: 1px solid #ddd;
              border-radius: 4px;
              color: #666;
              text-decoration: none;
              font-size: 13px;
              background-color: #f9f9f9;
            "
          >
            🏠 홈으로 돌아가기
          </a>
        </div>

        <div id="authMessage" class="status-box hidden"></div>
      </section>
    </main>

    <script src="/js/login.js"></script>
  </body>
</html>
