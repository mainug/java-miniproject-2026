<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 | 중고마켓</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card">
        <h1>중고마켓</h1>
        <p class="auth-subtitle">
          로그인 후 중고거래 게시판을 사용할 수 있습니다.
        </p>

        <div class="auth-tabs">
          <button type="button" id="loginTab" class="tab active">로그인</button>
          <button type="button" id="registerTab" class="tab">회원가입</button>
        </div>

        <form id="authForm" class="auth-form">
          <label class="row">
            <span>아이디</span>
            <input
              type="text"
              id="memberId"
              placeholder="아이디 입력"
              autocomplete="username"
            />
          </label>

          <label class="row">
            <span>비밀번호</span>
            <input
              type="password"
              id="memberPassword"
              placeholder="비밀번호 입력"
              autocomplete="current-password"
            />
          </label>

          <button type="submit" id="submitButton">로그인</button>
        </form>

        <div id="authMessage" class="status-box hidden"></div>
      </section>
    </main>

    <script src="/js/login.js"></script>
  </body>
</html>
