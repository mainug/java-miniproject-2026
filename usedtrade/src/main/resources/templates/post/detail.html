<!doctype html>
<html
  lang="ko"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  th:replace="~{layout :: layout(~{::content}, ~{::pageScripts})}">

  <th:block th:fragment="content">
    <div class="app">
      <div class="wrap">
        <div id="detailStatus" class="status-box hidden"></div>

        <section class="post-detail-page">
          <div class="detail-top">
            <a href="/" class="small-button">← 목록으로</a>
          </div>

          <article class="detail-card">
            <section class="detail-image-area">
              <div id="mainImageBox" class="detail-main-image">
                <span>이미지 불러오는 중...</span>
              </div>

              <div id="thumbnailList" class="detail-thumbnail-list"></div>
            </section>

            <section class="detail-info-area">
              <div class="detail-category" id="postCategory">카테고리</div>

              <h2 id="postTitle">상품명</h2>

              <strong id="postPrice" class="detail-price">0원</strong>

              <div class="detail-meta">
                <span id="postLocation">거래 지역</span>
                <span id="postStatus">판매중</span>
              </div>

              <div class="detail-sub-meta">
                <span id="postCreatedAt">등록일</span>
                <span id="postViewCount">조회수 0</span>
              </div>

              <hr />

              <div class="detail-content">
                <h3>상품 설명</h3>
                <p id="postContent"></p>
              </div>
            </section>
          </article>
        </section>
      </div>
    </div>
  </th:block>

  <th:block th:fragment="pageScripts">
    <script src="/js/detail.js"></script>
  </th:block>
</html>
