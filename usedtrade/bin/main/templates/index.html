<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>중고마켓</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="app">
      <div class="wrap">
        <header class="top-bar">
          <div>
            <h1>중고마켓</h1>
            <p class="subtitle">계정: <span id="loginUsername">비회원</span></p>
          </div>

          <div class="user-box">
            <a href="/login.html" id="loginLink" class="small-button">로그인</a>
            <button type="button" id="logoutButton" class="small-button hidden">
              로그아웃
            </button>
          </div>
        </header>

        <div id="marketStatus" class="status-box hidden"></div>

        <section class="section-header">
          <div>
            <h2>상품 목록</h2>
            <p class="summary">총 <span id="productCount">0</span>개</p>
          </div>

          <div class="filter-box">
            <select id="categoryFilter">
              <option value="ALL">전체</option>
              <option value="DIGITAL">디지털기기</option>
              <option value="FURNITURE">가구</option>
              <option value="CLOTHES">의류</option>
              <option value="BOOK">도서</option>
              <option value="ETC">기타</option>
            </select>
          </div>
        </section>

        <section id="productList" class="product-list">
          <p class="empty">상품을 불러오는 중...</p>
        </section>

        <button
          type="button"
          id="openProductWriteButton"
          class="upload-fab floating"
          aria-label="상품 등록"
          title="상품 등록"
        >
          +
        </button>
      </div>
    </div>

    <div id="productWriteModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h2>상품 등록</h2>
          <button type="button" id="closeProductWriteButton">×</button>
        </div>

        <form id="productWriteForm" class="product-form">
          <label class="row">
            <span>상품명</span>
            <input
              type="text"
              id="productTitle"
              placeholder="상품명을 입력하세요"
            />
          </label>

          <label class="row">
            <span>가격</span>
            <input
              type="number"
              id="productPrice"
              placeholder="가격을 입력하세요"
            />
          </label>

          <label class="row">
            <span>카테고리</span>
            <select id="productCategory">
              <option value="DIGITAL">디지털기기</option>
              <option value="FURNITURE">가구</option>
              <option value="CLOTHES">의류</option>
              <option value="BOOK">도서</option>
              <option value="ETC">기타</option>
            </select>
          </label>

          <label class="row">
            <span>거래 지역</span>
            <input type="text" id="tradeLocation" placeholder="예: 부산 남구" />
          </label>

          <label class="row">
            <span>상품 설명</span>
            <textarea
              id="productContent"
              placeholder="상품 설명을 입력하세요"
            ></textarea>
          </label>

          <label class="row">
            <span>상품 이미지</span>
            <input type="file" id="productImages" accept="image/*" multiple />
          </label>

          <button type="submit">등록하기</button>
        </form>
      </div>
    </div>

    <script src="/js/market.js"></script>
  </body>
</html>
