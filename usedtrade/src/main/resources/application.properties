spring.application.name=usedtrade

spring.output.ansi.enabled=always

logging.level.root=info
logging.level.com.pknu26.usedtrade.mapper=debug
logging.level.org.mybatis=debug
logging.level.java.sql=debug

spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=usedtrade
spring.datasource.password=1234

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.pknu26.usedtrade.dto
mybatis.configuration.map-underscore-to-camel-case=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-http-form-post-size=200MB
server.tomcat.max-swallow-size=200MB

# mac이라 이렇게 변경
file.upload-dir=/Users/nahyeon/Projects/java-miniproject-2026/usedtrade/uploads/

## Thymeleaf 설정 - 개발때만 추가
spring.thymeleaf.cache=false