    <meta charset="UTF-8" />

    <title>중고마켓</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>

  <body>
    <div class="app">
      <div class="wrap">
        <header class="top-bar">
          <div>
            <h1>중고마켓</h1>
            <p class="subtitle">계정: <span id="loginUsername">비회원</span></p>
          </div>

          <div class="user-box">

            <button type="button" id="logoutButton" class="small-button hidden">
              로그아웃
            </button>
          </div>
        </header>

        <div id="marketStatus" class="status-box hidden"></div>

        <section class="section-header">
          <div>
            <h2>상품 목록</h2>
            <p class="summary">총 <span id="productCount">0</span>개</p>
          </div>

          <form id="searchForm" class="filter-box">
            <input
              type="text"
              id="keywordSearch"
              name="keyword"
              class="search-input"
              placeholder="상품명, 설명, 지역 검색"
            />

            <select id="categoryFilter" name="category">
              <option value="ALL">전체</option>
              <option value="DIGITAL">디지털기기</option>
              <option value="FURNITURE">가구</option>
              <option value="CLOTHES">의류</option>
              <option value="BOOK">도서</option>
              <option value="ETC">기타</option>
            </select>

            <select id="sortFilter" name="sort">
              <option value="LATEST">최신순</option>
              <option value="PRICE_ASC">가격 낮은순</option>
              <option value="PRICE_DESC">가격 높은순</option>
            </select>

            <button type="submit" class="search-button">검색</button>
          </form>
        </section>

        <section id="productList" class="product-list">
          <p class="empty">상품을 불러오는 중...</p>
        </section>

        <button
          type="button"
          id="openProductWriteButton"
          class="upload-fab floating"
          aria-label="상품 등록"
          title="상품 등록"
        >
          +
        </button>
      </div>
    </div>

    <div id="productWriteModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h2>상품 등록</h2>
          <button type="button" id="closeProductWriteButton">×</button>
        </div>

        <form id="productWriteForm" class="product-form">
          <label class="row">
            <span>상품명</span>
            <input
              type="text"
              id="productTitle"
              placeholder="상품명을 입력하세요"
            />
          </label>

          <label class="row">
            <span>가격</span>
            <input
              type="number"
              id="productPrice"
              placeholder="가격을 입력하세요"
            />
          </label>

          <label class="row">
            <span>카테고리</span>
            <select id="productCategory">
              <option value="DIGITAL">디지털기기</option>
              <option value="FURNITURE">가구</option>
              <option value="CLOTHES">의류</option>
              <option value="BOOK">도서</option>
              <option value="ETC">기타</option>
            </select>
          </label>

          <label class="row">
            <span>거래 지역</span>
            <input type="text" id="tradeLocation" placeholder="예: 부산 남구" />
          </label>

          <label class="row">
            <span>상품 설명</span>
            <textarea
              id="productContent"
              placeholder="상품 설명을 입력하세요"
            ></textarea>
          </label>

          <label class="row">
            <span>상품 이미지</span>

            <div class="image-upload-box">
              <input type="file" id="productImages" accept="image/*" multiple />

              <div id="imagePreviewList" class="image-preview-list">
                <p class="image-preview-empty">선택된 이미지가 없습니다.</p>
              </div>
            </div>
          </label>

          <button type="submit">등록하기</button>
        </form>
      </div>
    </div>

    <script src="/js/market.js"></script>
  </body>
</html>
